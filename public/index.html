<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALgoat</title>
  <meta name="description" content="The algo trading IDE for Solana memecoins. Open source. No backend. Your keys, your machine." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #080808;
      --card:   #111111;
      --border: rgba(255,255,255,0.07);
      --text:   #f0f0f0;
      --muted:  #777;
      --blue:   #2EA8FF;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(46,168,255,0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(46,168,255,0.12);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
      max-width: 340px;
      line-height: 1.5;
    }

    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: #040d18;
      font-size: 14px;
      font-weight: 700;
      padding: 11px 22px;
      border-radius: 10px;
      text-decoration: none;
      transition: filter 0.15s, transform 0.15s;
      box-shadow: 0 0 32px rgba(46,168,255,0.2);
    }

    .github-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .github-btn:active { transform: scale(0.98); }

    .github-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    footer {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">
      <img src="/algoat-logo.png" alt="ALgoat" />
    </div>

    <h1>ALgoat</h1>

    <p class="tagline">The algo trading IDE built for Solana memecoins. Open source. Your keys. Your machine.</p>

    <a class="github-btn" href="https://github.com/algoat/algoat" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      View on GitHub
    </a>
  </main>

  <footer>open source · free forever · nothing here is financial advice</footer>
</body>
</html>
