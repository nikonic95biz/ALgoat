<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALgoat</title>
  <meta name="description" content="Open source, browser native algo trading IDE for Solana memecoins." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid #e5e5e5;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.035em;
      color: #0a0a0a;
    }

    p {
      font-size: 1rem;
      font-weight: 400;
      color: #666;
      max-width: 360px;
      line-height: 1.55;
    }

    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0a0a0a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .github-btn:hover { opacity: 0.8; }

    .github-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/algoat-logo.png" alt="ALgoat" />
  </div>

  <h1>ALgoat</h1>

  <p>Open source, browser native algo trading IDE for Solana memecoins.</p>

  <a class="github-btn" href="https://github.com/ALgoatorg/ALgoat" target="_blank" rel="noopener">

    GitHub
  </a>
</body>
</html>
