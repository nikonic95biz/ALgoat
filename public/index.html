<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/algoat-logo.png" />
  <link rel="apple-touch-icon" href="/algoat-logo.png" />
  <title>ALgoat — Memecoin Algo Trading IDE</title>
  <meta name="description" content="Open source, browser native algo trading IDE for Solana memecoins." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid #e5e5e5;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.035em;
      color: #0a0a0a;
    }

    p {
      font-size: 1rem;
      font-weight: 400;
      color: #666;
      max-width: 360px;
      line-height: 1.55;
    }

    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0a0a0a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .github-btn:hover { opacity: 0.8; }

    .github-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .links {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tg-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0a0a0a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .tg-btn:hover { opacity: 0.8; }
    .tg-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .support-card {
      width: min(100%, 520px);
      margin-top: 4px;
      padding: 14px;
      border: 1px solid #ececec;
      border-radius: 14px;
      background: #fafafa;
    }

    .support-title {
      max-width: none;
      margin-bottom: 10px;
      color: #333;
      font-size: 13px;
      font-weight: 500;
    }

    .copy-ca {
      width: 100%;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }

    .copy-ca:hover {
      border-color: #cfcfcf;
      background: #fdfdfd;
    }

    .ca-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: #444;
    }

    .copy-label {
      flex-shrink: 0;
      color: #0a0a0a;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/algoat-logo.png" alt="ALgoat" />
  </div>

  <h1>ALgoat</h1>

  <p>Open source, browser native algo trading IDE for Solana memecoins.</p>

  <div class="links">
    <a class="github-btn" href="https://github.com/ALgoatorg/ALgoat" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      GitHub
    </a>

    <a class="tg-btn" href="https://t.me/+2O3GgrNCR1w5YmQ1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      Support
    </a>
  </div>

  <div class="support-card">
    <p class="support-title">You can support the open source community here:</p>
    <button class="copy-ca" type="button" data-ca="Do4PgVvgw9RNUMks4dTwyvrHjSsdMP2bcKcwybk2pump" aria-label="Copy support CA">
      <span class="ca-text">Do4PgVvgw9RNUMks4dTwyvrHjSsdMP2bcKcwybk2pump</span>
      <span class="copy-label">Copy</span>
    </button>
  </div>

  <script>
    const button = document.querySelector(".copy-ca");
    const label = document.querySelector(".copy-label");
    button?.addEventListener("click", async () => {
      const ca = button.dataset.ca || "";
      try {
        await navigator.clipboard.writeText(ca);
        label.textContent = "Copied";
        window.setTimeout(() => { label.textContent = "Copy"; }, 1400);
      } catch {
        label.textContent = "Select";
      }
    });
  </script>
</body>
</html>
